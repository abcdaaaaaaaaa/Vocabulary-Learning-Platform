<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Learning Platform</title>
<link rel="shortcut icon" href="learn.ico">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>

<div class="container">
    <h1>Smart Learning Platform</h1>
    
    <div class="controls">
        <label class="small" id="fileLabel">
            <input id="file" type="file" accept=".txt">
        </label>
		
		<select id="themeSel">
			<option value="light">Light Theme</option>
			<option value="dark">Dark Theme</option>
			<option value="space" selected>Space Theme</option>
			<option value="submarine">Submarine Theme</option>
			<option value="ice">Ice Theme</option>
			<option value="ocean">Ocean Theme</option>
			<option value="nature">Nature Theme</option>
			<option value="carrot">Carrot Theme</option>
			<option value="cotton">Cotton Theme</option>
		</select>

        <select id="period" style="display:none">
            <option value="12">12 Words / Set</option>
            <option value="6">6 Words / Set</option>
            <option value="24">24 Words / Set</option>
        </select>
        
        <select id="lang" style="display:none">
            <option value="none">Silent Mode</option>
            <option value="en" selected>English</option>
            <option value="tr">Türkçe</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="ru">Русский</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="zh">中文</option>
            <option value="ar">العربية</option>
            <option value="pt">Português</option>
            <option value="nl">Nederlands</option>
            <option value="sv">Svenska</option>
            <option value="pl">Polski</option>
            <option value="hi">हिन्दी</option>
            <option value="id">Bahasa Indonesia</option>
            <option value="cs">Čeština</option>
            <option value="el">Ελληνικά</option>
            <option value="he">עברית</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
        </select>
        
        <div id="switchBox" style="display:none">
            <label class="switch">
                <input type="checkbox" id="flashcardSwitch" checked>
                <span class="slider"></span><span class="label">Study Flashcard</span>
            </label>
            <label class="switch">
                <input type="checkbox" id="speechSwitch" checked>
                <span class="slider"></span>
                <span class="label">Word Reading 
                    <span id="wifiIcon" style="display:none; margin-left:4px;" title="Offline">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; color: var(--error-border);"><line x1="2" y1="2" x2="22" y2="22"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path><path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                    </span>
                </span>
            </label>
            <label class="switch">
                <input type="checkbox" id="musicSwitch" checked>
                <span class="slider"></span><span class="label">Correct Sound</span>
            </label>
        </div>
        
        <button id="start" style="display:none">Start</button>
        <button id="reset" style="display:none">Reset</button>
    </div>
    
    <div class="progress" id="progress"></div>
    
    <div id="flashcardArea" class="card fc-area" style="display:none">
        <div class="fc-box" id="fcBox">
            <div class="fc-word" id="fcWord">Word</div>
            <div class="fc-instruction" id="fcInstruction">Click to see definition and examples</div>
            <div class="fc-details" id="fcDetails">
                <div class="fc-def" id="fcDef">Definition</div>
                <ul class="fc-examples" id="fcExamples"></ul>
            </div>
        </div>
        <button id="fcNextBtn" class="primary-btn" style="display:none; margin-top:15px; width:100%; max-width: 300px; padding:12px;">I Learned It, Next</button>
    </div>

    <div id="quiz" style="display:none">
        <div class="card">
            <div class="definition" id="definition"></div>
            <div class="options" id="options"></div>
            <div class="field" id="writeArea" style="display:none">
                <input id="typed" class="input-typed" placeholder="Please type your answer here." autocomplete="off">
                <button id="checkTyped">Check</button>
            </div>
            <div style="text-align:center">
                <button id="hintBtn">Hint</button>
                <button id="dontKnowBtn">I Don't Know</button>
                <button id="continueBtn">I Learned It</button>
                <button id="correctBtn">My Answer Was Already Correct</button>
            </div>
            <div class="footer">
                <div class="note" id="result"></div>
                <div class="progress" id="counter"></div>
            </div>
        </div>
    </div>
</div>

<audio id="correctSound" src="correctSound.mp3"></audio>
<audio id="finishBatchSound" src="finishBatchSound.mp3"></audio>
<audio id="finishAllSound" src="finishAllSound.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
